version: "3.1"

intents:
  - greet
  - goodbye
  - provide_user_story
  - provide_domain
  - confirm
  - deny
  - start_over
  - help

entities:
  - actor
  - goal
  - constraint
  - domain_context

slots:
  project_id:
    type: text
    mappings:
      - type: custom

  user_token:
    type: text
    mappings:
      - type: custom

  actor:
    type: text
    mappings:
      - type: custom

  goal:
    type: text
    mappings:
      - type: custom

  constraint:
    type: text
    mappings:
      - type: custom

  domain_context:
    type: text
    mappings:
      - type: from_text
        conditions:
          - active_loop: user_story_form
            requested_slot: domain_context

  story_confirmed:
    type: bool
    mappings:
      - type: custom

  submission_result:
    type: text
    mappings:
      - type: custom

forms:
  user_story_form:
    required_slots:
      - domain_context

responses:
  utter_greet:
    - text: |
        Hi! I'm the ReqGen assistant 👋
        I help you capture user stories and turn them into structured requirements.

        Tell me your user story using this format:
        "As a [actor], I want to [goal] so that [condition]"

        Type "help" at any time for guidance.

  utter_ask_domain_context:
    - text: |
        Which domain or module does this belong to?
        (e.g. "Authentication", "Patient Management", "Prescription & Medication", "Payments", "Reporting")

  utter_confirm_story:
    - text: |
        Here's your user story:

        👤 Actor:      {actor}
        🎯 Goal:       {goal}
        ✅ Condition:  {constraint}
        🏷️  Domain:     {domain_context}

        Shall I submit this for requirements generation? (yes / no)

  utter_submitting:
    - text: "Submitting your user story... ⏳"

  utter_submission_success:
    - text: |
        ✅ Submitted! Requirements will appear in the Requirements tab shortly.

        Would you like to submit another story? (yes / no)

  utter_submission_failed:
    - text: |
        ❌ Something went wrong submitting your story.
        Please try again or contact support.

  utter_goodbye:
    - text: |
        Goodbye! 👋 Check the Requirements tab to review and approve your generated requirements.

  utter_help:
    - text: |
        Here's how to use the ReqGen assistant:

        1. Tell me your user story:
           "As a [actor], I want to [goal] so that [condition]"

        2. I'll ask which domain it belongs to.

        3. Review the summary and confirm to submit for AI-powered requirements generation.

        4. Review, approve, or edit requirements in the Requirements tab.

        Ready? Tell me your user story now.

  utter_restart:
    - text: "No problem — tell me your new user story."

  utter_ask_another:
    - text: "Would you like to submit another story? (yes / no)"

  utter_default:
    - text: |
        I didn't quite understand that.
        Try telling me your user story, or type "help" for guidance.

actions:
  - action_session_start
  - action_submit_user_story
  - action_restart_conversation
  - action_extract_nlp_slots
  - validate_user_story_form

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true