version: "3.1"

stories:

- story: provide domain inside form
  steps:
    - intent: provide_user_story
    - action: action_extract_nlp_slots
    - action: user_story_form
    - active_loop: user_story_form
    - intent: provide_domain
    - action: user_story_form
    - active_loop: null
    - action: utter_confirm_story

- story: greet then provide story
  steps:
    - intent: greet
    - action: utter_greet
    - intent: provide_user_story
    - action: action_extract_nlp_slots
    - action: user_story_form
    - active_loop: user_story_form
    - intent: provide_domain
    - action: user_story_form
    - active_loop: null
    - action: utter_confirm_story

- story: help then provide story
  steps:
    - intent: help
    - action: utter_help
    - intent: provide_user_story
    - action: action_extract_nlp_slots
    - action: user_story_form
    - active_loop: user_story_form
    - intent: provide_domain
    - action: user_story_form
    - active_loop: null
    - action: utter_confirm_story

- story: restart mid form
  steps:
    - intent: provide_user_story
    - action: action_extract_nlp_slots
    - action: user_story_form
    - active_loop: user_story_form
    - intent: start_over
    - action: action_deactivate_loop
    - active_loop: null
    - action: action_restart_conversation
    - action: utter_restart