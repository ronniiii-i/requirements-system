version: "3.1"

nlu:

- intent: greet
  examples: |
    - hi
    - hello
    - hey
    - good morning
    - good afternoon
    - hi there
    - hello there
    - hey there
    - start
    - begin
    - let's start
    - I want to add a user story
    - I'd like to submit a story

- intent: goodbye
  examples: |
    - bye
    - goodbye
    - see you
    - done
    - I'm done
    - that's all
    - finish
    - exit
    - quit
    - no more stories
    - no thanks I'm done
    - no I'm finished

- intent: provide_user_story
  examples: |
    - As a [doctor](actor), I want to [view patient records](goal) so that [I can access their history](constraint)
    - As a [registered user](actor), I want to [reset my password](goal) so that [I can regain access within 5 minutes](constraint)
    - As an [admin](actor), I want to [manage user accounts](goal) so that [only authorised staff can log in](constraint)
    - As a [customer](actor), I want to [track my order](goal) so that [I know the estimated delivery time](constraint)
    - As a [developer](actor), I want to [view API logs](goal) so that [I can debug issues within 2 minutes](constraint)
    - As a [nurse](actor), I want to [update patient vitals](goal) so that [the latest readings are available within 10 seconds](constraint)
    - As a [manager](actor), I want to [generate monthly reports](goal) so that [I can review team performance](constraint)
    - As a [student](actor), I want to [submit assignments online](goal) so that [submissions are confirmed immediately](constraint)
    - As a [buyer](actor), I want to [add items to a cart](goal) so that [I can purchase multiple items at once](constraint)
    - As a [system administrator](actor), I want to [schedule database backups](goal) so that [data is preserved every 24 hours](constraint)
    - As a [patient](actor), I want to [book an appointment online](goal) so that [I receive a confirmation within 1 minute](constraint)
    - As a [pharmacist](actor), I want to [check drug interactions](goal) so that [warnings appear before dispensing](constraint)
    - As a [doctor](actor), I want to [electronically sign a prescription](goal) so that [the patient can pick up their medicine immediately](constraint)
    - As a [lab technician](actor), I want to [upload test results](goal) so that [doctors can view them within 30 seconds](constraint)
    - As a [receptionist](actor), I want to [schedule patient appointments](goal) so that [double-bookings are prevented automatically](constraint)
    - As a [billing officer](actor), I want to [generate invoices](goal) so that [patients receive them within 1 minute of discharge](constraint)
    - As a [system admin](actor), I want to [configure user roles](goal) so that [access is restricted to authorised personnel only](constraint)
    - As a [warehouse manager](actor), I want to [track stock levels](goal) so that [low stock alerts are triggered automatically](constraint)
    - As a [finance officer](actor), I want to [export transaction reports](goal) so that [all records are available in Excel format](constraint)
    - As a [support agent](actor), I want to [view customer history](goal) so that [I can resolve tickets within the SLA](constraint)

