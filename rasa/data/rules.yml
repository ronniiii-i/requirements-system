version: "3.1"

rules:

- rule: Greet user
  steps:
    - intent: greet
    - action: utter_greet

- rule: Show help
  steps:
    - intent: help
    - action: utter_help

- rule: Say goodbye
  steps:
    - intent: goodbye
    - action: utter_goodbye

- rule: Handle fallback
  steps:
    - intent: nlu_fallback
    - action: utter_default

- rule: Activate form when user story is provided
  steps:
    - intent: provide_user_story
    - action: action_extract_nlp_slots
    - action: user_story_form
    - active_loop: user_story_form

- rule: Submit form and show confirmation
  condition:
    - active_loop: user_story_form
  steps:
    - action: user_story_form
    - active_loop: null
    - action: utter_confirm_story

- rule: User confirms after summary — submit story
  steps:
    - action: utter_confirm_story
    - intent: confirm
    - action: utter_submitting
    - action: action_submit_user_story

- rule: User denies after summary — restart
  steps:
    - action: utter_confirm_story
    - intent: deny
    - action: action_restart_conversation
    - action: utter_restart

- rule: User says no after submission — goodbye
  steps:
    - action: action_submit_user_story
    - intent: deny
    - action: utter_goodbye

- rule: User wants another story after submission
  steps:
    - action: action_submit_user_story
    - intent: start_over
    - action: action_restart_conversation
    - action: utter_restart

- rule: User wants to start over at any time
  steps:
    - intent: start_over
    - action: action_deactivate_loop
    - action: action_restart_conversation
    - action: utter_restart